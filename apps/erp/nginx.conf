server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript
                    application/json image/svg+xml
                    application/x-font-ttf font/woff2;

    # Assets com hash — cache longo
    location ~* \.(js|css|woff2?|ttf|svg|png|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback — todas as rotas caem no index.html
    # A API é chamada diretamente pelo frontend via VITE_API_URL (https://api.acme.aurabr.app)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
