server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # DNS interno do Docker — resolve nomes de container em runtime
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript
                    application/json image/svg+xml;

    # Assets com hash — cache longo
    location ~* \.(js|css|woff2?|ttf|svg|png|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Proxy /master/* → API
    # API_HOST configurável via variável de ambiente (default: api-acme)
    location /master/ {
        set $api_host "${API_HOST}";
        proxy_pass         http://$api_host:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # Proxy /billing/webhook → API
    location /billing/ {
        set $api_host "${API_HOST}";
        proxy_pass         http://$api_host:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
