name: Deploy

on:
  push:
    branches:
      - staging
      - main

# Um deploy por vez no VPS (evita corrida de recursos)
concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: [self-hosted, aura-vps]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Classificar tipo de mudança
        id: classify
        run: |
          set -e
          chmod +x .github/scripts/classify-changes.sh
          OUT=$(bash .github/scripts/classify-changes.sh "${{ github.ref_name }}")
          echo "$OUT"
          echo "$OUT" >> "$GITHUB_OUTPUT"

      - name: Release (versionamento automatico)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          REF="${{ github.ref_name }}"
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/helygp/aura-platform/contents/scripts/release.mjs?ref=$REF" -o "$GITHUB_WORKSPACE/.aura-release.mjs"
          MODE=$([ "$REF" = "main" ] && echo --apply || echo --dry-run)
          # Fase D #122: docker run -v nao funciona quando o runner eh container (path resolvido pelo daemon do host).
          # Usar docker create + docker cp envia os bytes do release.mjs via daemon, independente de bind mount.
          CID=$(docker create -e GH_TOKEN -e RELEASE_BRANCH node:22-bookworm-slim node /release.mjs $MODE)
          docker cp "$GITHUB_WORKSPACE/.aura-release.mjs" "$CID:/release.mjs"
          docker start -a "$CID"
          RC=$?
          docker rm "$CID" >/dev/null
          exit $RC

      - name: Deploy local (sem SSH)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          export DEPLOY_LOG_DIR="$GITHUB_WORKSPACE/../deploy-logs"
          mkdir -p "$DEPLOY_LOG_DIR"
          REPO_DIR="$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$REPO_DIR"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          bash "$REPO_DIR/deploy.sh" "${{ github.ref_name }}"

      - name: Notificar n8n deploy_concluido
        if: success() && github.ref_name == 'main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set +e
          # Ultima tag p/ delimitar compare
          LAST_TAG=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/helygp/aura-platform/tags?per_page=1" | grep -oE '"name":"[^"]+"' | head -1 | cut -d'"' -f4)
          if [ -n "$LAST_TAG" ]; then
            CMP=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/helygp/aura-platform/compare/$LAST_TAG...$SHA")
          else
            CMP=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/helygp/aura-platform/commits?sha=$SHA&per_page=50")
          fi
          # Extrai ticket ids de subjects [#NNN] (padrao do ticket; evita confusao com PR refs (#NN))
          TICKETS=$(printf '%s' "$CMP" | grep -oE '\\[#[0-9]+\\]' | grep -oE '[0-9]+' | sort -u | tr '\n' ',' | sed 's/,$//')
          VERSION=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/helygp/aura-platform/contents/apps/erp/public/changelog.json?ref=main" 2>/dev/null | grep -oE '"current":"[^"]+"' | head -1 | cut -d'"' -f4)
          PAYLOAD=$(printf '{"token":"auradev-7c1f9a2b6e","evento":"deploy_concluido","sha":"%s","branch":"%s","version":"%s","ticket_ids":[%s]}' "$SHA" "$BRANCH" "$VERSION" "$TICKETS")
          echo "Payload: $PAYLOAD"
          curl -s -m 15 -X POST -H "Content-Type: application/json" -d "$PAYLOAD" \
            "https://n8n.srv885928.hstgr.cloud/webhook/aurasuporte-dev" && echo "" && echo "n8n notify ok" || echo "n8n notify falhou (ignorado)"

      - name: Notificar WhatsApp
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
          REF: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHANGE_TYPE: ${{ steps.classify.outputs.change_type }}
        run: |
          CFG=/home/helygp/projetos/.deploy-notify.env
          [ -f "$CFG" ] || { echo "sem config de notify; pulando"; exit 0; }
          . "$CFG"
          if [ "$DEPLOY_STATUS" = "success" ]; then ICON="✅"; PAL="OK"; else ICON="❌"; PAL="FALHOU"; fi
          if [ "$REF" = "main" ]; then AMB="PRODUÇÃO"; else AMB="staging"; fi

          # Linha extra de atenção quando: produção + master-only/mixed (sem staging)
          ATTENTION=""
          if [ "$REF" = "main" ] && { [ "$CHANGE_TYPE" = "master-only" ] || [ "$CHANGE_TYPE" = "mixed" ]; }; then
            ATTENTION="⚠️ Tipo: $CHANGE_TYPE (sem staging — revisar logs)"
          elif [ -n "$CHANGE_TYPE" ]; then
            ATTENTION="Tipo: $CHANGE_TYPE"
          fi

          LINE1=$(printf '%s' "$COMMIT_MSG" | head -1)

          if [ -n "$ATTENTION" ]; then
            TXT=$(printf '%s\n%s\n%s\n%s\n%s' "$ICON Deploy $AMB $PAL" "Branch: $REF" "$ATTENTION" "$LINE1" "$RUN_URL")
          else
            TXT=$(printf '%s\n%s\n%s\n%s' "$ICON Deploy $AMB $PAL" "Branch: $REF" "$LINE1" "$RUN_URL")
          fi
          TXT_ESC=$(printf '%s' "$TXT" | sed 's/\\/\\\\/g; s/\"/\\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -s -m 20 -X POST "$WAHA_URL/api/sendText" -H "X-Api-Key: $WAHA_API_KEY" -H "Content-Type: application/json" -d "{\"session\":\"$WAHA_SESSION\",\"chatId\":\"$NOTIFY_CHAT_ID\",\"text\":\"$TXT_ESC\"}" >/dev/null && echo "notify enviado" || echo "notify falhou (ignorado)"

      - name: Status
        if: always()
        run: echo "Deploy ${{ github.ref_name }} -- ${{ job.status }} (self-hosted)"
