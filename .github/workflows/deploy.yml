name: Deploy

on:
  push:
    branches:
      - staging
      - main

# Um deploy por vez no VPS (evita corrida de recursos)
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: [self-hosted, aura-vps]

    steps:
      - name: Deploy local (sem SSH)
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_LOG_DIR: /home/helygp/projetos/deploy-logs
        run: |
          set -e
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          REPO_DIR=/home/helygp/projetos/aura-platform

          # Credencial de git EFEMERA (token do job, escopo do repo, expira ao fim):
          # fica no HOME do container do runner, nunca no .git/config do repo do host.
          git config --global --add safe.directory "$REPO_DIR"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

          # deploy.sh ja faz git fetch/checkout/reset + build + deploy
          # e grava o log em $DEPLOY_LOG_DIR (no host, fora do git)
          bash "$REPO_DIR/deploy.sh" "${{ github.ref_name }}"

      - name: Status
        if: always()
        run: echo "Deploy ${{ github.ref_name }} -- ${{ job.status }} (self-hosted)"
