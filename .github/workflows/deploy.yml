name: Deploy

on:
  push:
    branches:
      - staging
      - main

# Um deploy por vez no VPS (evita corrida de recursos)
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: [self-hosted, aura-vps]

    steps:
      - name: Deploy local (sem SSH)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          export DEPLOY_LOG_DIR=/home/helygp/projetos/deploy-logs
          REPO_DIR=/home/helygp/projetos/aura-platform
          git config --global --add safe.directory "$REPO_DIR"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          bash "$REPO_DIR/deploy.sh" "${{ github.ref_name }}"

      - name: Notificar WhatsApp
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
          REF: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          CFG=/home/helygp/projetos/.deploy-notify.env
          [ -f "$CFG" ] || { echo "sem config de notify; pulando"; exit 0; }
          . "$CFG"
          if [ "$DEPLOY_STATUS" = "success" ]; then ICON="✅"; PAL="OK"; else ICON="❌"; PAL="FALHOU"; fi
          if [ "$REF" = "main" ]; then AMB="PRODUÇÃO"; else AMB="staging"; fi
          LINE1=$(printf '%s' "$COMMIT_MSG" | head -1)
          TXT=$(printf '%s\n%s\n%s\n%s' "$ICON Deploy $AMB $PAL" "Branch: $REF" "$LINE1" "$RUN_URL")
          TXT_ESC=$(printf '%s' "$TXT" | sed 's/\\/\\\\/g; s/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -s -m 20 -X POST "$WAHA_URL/api/sendText" -H "X-Api-Key: $WAHA_API_KEY" -H "Content-Type: application/json" -d "{\"session\":\"$WAHA_SESSION\",\"chatId\":\"$NOTIFY_CHAT_ID\",\"text\":\"$TXT_ESC\"}" >/dev/null && echo "notify enviado" || echo "notify falhou (ignorado)"

      - name: Status
        if: always()
        run: echo "Deploy ${{ github.ref_name }} -- ${{ job.status }} (self-hosted)"
