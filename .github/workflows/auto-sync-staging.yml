name: Auto-sync staging

# Mantem a branch `staging` sempre fast-forward com `main`.
# Disparado em todo push pra main (incluindo merges de PR).
# - Se staging ja esta em dia, sai em silencio (no-op).
# - Se staging esta atras de main e e fast-forward limpo, atualiza staging.
# - Se staging divergiu de main (commits exclusivos em staging), aborta e
#   manda alerta pelo WhatsApp pedindo merge manual.
#
# Origem: ticket #52 expos drift entre main e staging porque commits
# diretos em main (ex: 881d666) nao retornavam pra staging.

on:
  push:
    branches:
      - main
  # Tambem permite rodar manualmente (testes, recuperacao de falhas, sync sob demanda)
  workflow_dispatch:

# Pushes consecutivos em main: so a sincronizacao mais recente importa,
# cancela jobs antigos em flight pra economizar runner.
concurrency:
  group: auto-sync-staging
  cancel-in-progress: true

jobs:
  sync:
    name: Fast-forward staging com main
    runs-on: [self-hosted, aura-vps]

    steps:
      - name: Sincronizar staging
        env:
          GH_TOKEN: ${{ secrets.AUTO_SYNC_PAT }}
        run: |
          set -e
          REPO_DIR=/home/helygp/projetos/aura-platform
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"

          git config --global --add safe.directory "$REPO_DIR"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global user.email "auto-sync-bot@aurabr.app"
          git config --global user.name "aura-auto-sync"

          cd "$REPO_DIR"
          git fetch --prune origin main staging

          BEHIND=$(git rev-list --count origin/staging..origin/main)
          AHEAD=$(git rev-list --count origin/main..origin/staging)

          echo "staging atras de main: $BEHIND commit(s)"
          echo "staging frente a main: $AHEAD commit(s)"

          if [ "$BEHIND" = "0" ]; then
            echo "staging ja esta sincronizado com main. Nada a fazer."
            echo "SYNC_RESULT=already_synced" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "$AHEAD" != "0" ]; then
            echo "ERRO: staging tem $AHEAD commit(s) exclusivo(s) que nao estao em main."
            echo "Fast-forward nao e possivel. Necessario merge manual:"
            echo "  git checkout staging && git merge main"
            echo "SYNC_RESULT=divergent" >> "$GITHUB_ENV"
            echo "SYNC_AHEAD=$AHEAD" >> "$GITHUB_ENV"
            echo "SYNC_BEHIND=$BEHIND" >> "$GITHUB_ENV"
            exit 1
          fi

          # Fast-forward limpo: avanca staging local ate main e empurra
          git checkout staging
          git merge --ff-only origin/main
          git push origin staging

          echo "staging avancado em $BEHIND commit(s) ate main"
          echo "SYNC_RESULT=synced" >> "$GITHUB_ENV"
          echo "SYNC_COUNT=$BEHIND" >> "$GITHUB_ENV"

      - name: Notificar WhatsApp
        if: always()
        run: |
          CFG=/home/helygp/projetos/.deploy-notify.env
          [ -f "$CFG" ] || { echo "sem config de notify; pulando"; exit 0; }
          . "$CFG"

          # Variaveis SYNC_* vem do step anterior via GITHUB_ENV, ja exportadas como env do shell.
          # Silenciar o caso comum (ja em dia) pra nao gerar ruido.
          if [ "$SYNC_RESULT" = "already_synced" ]; then
            echo "sync ja em dia, nao notifica"
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          case "$SYNC_RESULT" in
            synced)
              BODY_TXT="Auto-sync OK: staging avancou +$SYNC_COUNT commit(s) ate main"
              ICON="🔄"
              ;;
            divergent)
              BODY_TXT="Auto-sync FALHOU: staging diverge de main ($SYNC_AHEAD frente / $SYNC_BEHIND atras). Merge manual necessario."
              ICON="⚠️"
              ;;
            *)
              BODY_TXT="Auto-sync com status incerto. Ver run."
              ICON="❓"
              ;;
          esac

          TXT=$(printf '%s %s\n%s' "$ICON" "$BODY_TXT" "$RUN_URL")
          TXT_ESC=$(printf '%s' "$TXT" | sed 's/\\/\\\\/g; s/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

          curl -s -m 20 -X POST "$WAHA_URL/api/sendText" \
            -H "X-Api-Key: $WAHA_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"session\":\"$WAHA_SESSION\",\"chatId\":\"$NOTIFY_CHAT_ID\",\"text\":\"$TXT_ESC\"}" >/dev/null \
            && echo "notify enviado" || echo "notify falhou (ignorado)"

      - name: Status
        if: always()
        run: echo "Auto-sync staging -- resultado=$SYNC_RESULT job=${{ job.status }}"
